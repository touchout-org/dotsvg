        el.setAttribute('cx',           +cx.toFixed(2));
        el.setAttribute('cy',           +cy.toFixed(2));
        el.setAttribute('rx',           +rx.toFixed(2));
        el.setAttribute('ry',           +ry.toFixed(2));
        el.setAttribute('fill',         'none');
        el.setAttribute('stroke',       'black');
        el.setAttribute('stroke-width', sw);
        if (Math.abs(angleDeg) > 0.0001)
          el.setAttribute('transform', `rotate(${+angleDeg.toFixed(4)},${+cx.toFixed(2)},${+cy.toFixed(2)})`);
        svgDoc.documentElement.appendChild(el);

        ellipseF1 = null; ellipseF2 = null; ellipsePhase = 1;
        jumpAnchorId = id;
        appMode   = 'normal';
        renderCanvas(device);
        sendMessage(id, device);
        logKey(`ellipse  →  placed ${id}`);
        return;
      }

      // Cursor movement: LP(dot3)=left, RP(dot6)=right, dot2=up, dot5=down
      let dir = null;
      if      (byte6 === 0x04) dir = 'left';
      else if (byte6 === 0x20) dir = 'right';
      else if (byte6 === 0x02) dir = 'up';
      else if (byte6 === 0x10) dir = 'down';

      if (dir) {
        if (dir !== lastMoveDir) { lastMoveDir = dir; moveDirCount = 0; }
        moveDirCount++;
        const inc      = moveIncrement(moveDirCount);
        const displayW = device.numberCellColumns * 2;
        const displayH = device.numberCellRows * 4;
        const cupx     = viewport.w / displayW;
        const cupy     = viewport.h / displayH;
        if      (dir === 'left')  cursor.x -= inc * cupx;
        else if (dir === 'right') cursor.x += inc * cupx;
        else if (dir === 'up')    cursor.y -= inc * cupy;
        else if (dir === 'down')  cursor.y += inc * cupy;
        cursor.x = Math.max(0, Math.min(CANVAS_W, cursor.x));
        cursor.y = Math.max(0, Math.min(CANVAS_H, cursor.y));
        panViewportToCursor(device);
        renderCanvas(device);
        ellipseDimMessage(device);
      } else {
        lastMoveDir = null; moveDirCount = 0;
      }
    }

    // ── Quadrilateral drawing mode ────────────────────────────────────────────
    function enterQuadDraw(device) {
      quadStart = { x: cursor.x, y: cursor.y };
      appMode = 'quad-draw';
      lastMoveDir = null; moveDirCount = 0;
      logKey('quad draw  →  started');
      renderCanvas(device);
      quadDimMessage(device);
    }

    function quadDimMessage(device) {
      const displayW = device.numberCellColumns * 2;
      const displayH = device.numberCellRows * 4;
      const w = Math.round(Math.abs(cursor.x - quadStart.x) / (viewport.w / displayW)) + 1;
      const h = Math.round(Math.abs(cursor.y - quadStart.y) / (viewport.h / displayH)) + 1;
      const count = svgShapes().filter(el => shapeName(el).replace(/\d+$/, '') === 'quad').length + 1;
      const previewId = `quad${String(count).padStart(3, '0')}`;
      sendMessage(`${previewId} ${w}x${h}`, device);
    }

    function handleQuadDrawKey(byte6, label, device) {
      if (byte6 === 0x38) {              // dots 456 → OK
        const x0 = quadStart.x, y0 = quadStart.y;
        const x1 = cursor.x,    y1 = cursor.y;
        const count = svgShapes().filter(el => shapeName(el).replace(/\d+$/, '') === 'quad').length + 1;
        const id    = `quad${String(count).padStart(3, '0')}`;
        const pts   = `${+x0.toFixed(2)},${+y0.toFixed(2)} ${+x1.toFixed(2)},${+y0.toFixed(2)} ${+x1.toFixed(2)},${+y1.toFixed(2)} ${+x0.toFixed(2)},${+y1.toFixed(2)}`;
        const displayW = device.numberCellColumns * 2;
        const displayH = device.numberCellRows * 4;
        const sw    = Math.max(viewport.w / displayW, viewport.h / displayH).toFixed(2);

        const el = svgDoc.createElementNS(SVG_NS, 'polygon');
        el.setAttribute('data-name', id);
        el.setAttribute('id',        id);
        el.setAttribute('points',    pts);
        el.setAttribute('fill',         'none');
        el.setAttribute('stroke',       'black');
        el.setAttribute('stroke-width', sw);
        svgDoc.documentElement.appendChild(el);

        quadStart    = null;
        jumpAnchorId = id;
        appMode      = 'normal';
        renderCanvas(device);
        sendMessage(id, device);
        logKey(`quad  →  placed ${id}`);
        return;
      }

      if (byte6 === 0x07) {              // dots 123 → cancel
        quadStart = null;
        appMode   = 'normal';
        sendMessage('cancelled', device);
        logKey('quad  →  cancelled');
        renderCanvas(device);
        return;
      }

      // Normal cursor movement: LP=left, RP=right, dot2=up, dot5=down
      let dir = null;
      if      (byte6 === 0x04) dir = 'left';
      else if (byte6 === 0x20) dir = 'right';
      else if (byte6 === 0x02) dir = 'up';
      else if (byte6 === 0x10) dir = 'down';

      if (dir) {
        if (dir !== lastMoveDir) { lastMoveDir = dir; moveDirCount = 0; }
        moveDirCount++;
        const inc      = moveIncrement(moveDirCount);
        const displayW = device.numberCellColumns * 2;
        const displayH = device.numberCellRows * 4;
        const cupx     = viewport.w / displayW;
        const cupy     = viewport.h / displayH;
        if      (dir === 'left')  cursor.x -= inc * cupx;
        else if (dir === 'right') cursor.x += inc * cupx;
        else if (dir === 'up')    cursor.y -= inc * cupy;
        else if (dir === 'down')  cursor.y += inc * cupy;
        cursor.x = Math.max(0, Math.min(CANVAS_W, cursor.x));
        cursor.y = Math.max(0, Math.min(CANVAS_H, cursor.y));
        panViewportToCursor(device);
        renderCanvas(device);
        quadDimMessage(device);
      } else {
        lastMoveDir = null; moveDirCount = 0;
      }
    }

    // ── Path drawing mode ─────────────────────────────────────────────────────
    // Sends a scrolling coordinate list to the message display.
    // Format: "path001 0,0 3,-2 7,5 [live]" — confirmed vertices as offsets from
    // vertex 0, followed by the live cursor offset, scrolled right so the newest
    // point is always visible.
    function sendPathMessage(device) {
      const displayW = device.numberCellColumns * 2;
      const displayH = device.numberCellRows * 4;
      const cupx     = viewport.w / displayW;
      const cupy     = viewport.h / displayH;
      const origin   = pathVertices[0];
      const count    = svgShapes().filter(el => shapeName(el).replace(/\d+$/, '') === 'path').length + 1;
      const maxCells = device.numberBrailleCellColumns;

      // All confirmed vertices + live cursor as display-pixel offsets from vertex 0
      const coords = [
        ...pathVertices.map(v => [
          Math.round((v.x - origin.x) / cupx),
          Math.round((v.y - origin.y) / cupy)
        ]),
        [
          Math.round((cursor.x - origin.x) / cupx),
          Math.round((cursor.y - origin.y) / cupy)
        ]
      ];

      // Name is just the first token — scrolls off left like coordinate pairs do
      const tokens = [
        `path${String(count).padStart(3, '0')}`,
        ...coords.map(([x, y]) => `${x},${y}`)
      ];

      // Fit as many rightmost tokens as possible into the display width
      const display = [];
      let used = 0;
      for (let i = tokens.length - 1; i >= 0; i--) {
        const cost = (display.length > 0 ? 1 : 0) + tokens[i].length;
        if (used + cost <= maxCells) { display.unshift(tokens[i]); used += cost; }
        else break;
      }
      sendMessage(display.join(' '), device);
    }

    function enterPathDraw(device) {
      pathVertices = [{ x: cursor.x, y: cursor.y }];
      appMode = 'path-draw';
      lastMoveDir = null; moveDirCount = 0;
      logKey('path draw  →  started');
      renderCanvas(device);
      sendPathMessage(device);
    }

    function handlePathDrawKey(byte6, label, device) {
      const letter = byte6ToLetter(byte6);

      if (byte6 === 0x38) {              // dots 456 → OK (go to close prompt)
        if (pathVertices.length < 2) {
          sendMessage('need 2+ pts', device);
          return;
        }
        appMode = 'path-close';
        sendMessage('close fig? y/n', device);
        logKey('path  →  close prompt');
        return;
      }

      if (byte6 === 0x07) {              // dots 123 → cancel
        pathVertices = [];
        appMode = 'normal';
        sendMessage('cancelled', device);
        logKey('path  →  cancelled');
        renderCanvas(device);
        return;
      }

      if (byte6 === 0x08) {  // dot4 → place vertex
        lastMoveDir = null; moveDirCount = 0;
        pathVertices.push({ x: cursor.x, y: cursor.y });
        logKey(`path  →  vertex ${pathVertices.length} placed`);
        renderCanvas(device);
        sendPathMessage(device);
        return;
      }

      // Cursor movement: dot3=left, dot2=up, dot5=down, dot6=right
      let dir = null;
      if      (byte6 === 0x04) dir = 'left';
      else if (byte6 === 0x02) dir = 'up';
      else if (byte6 === 0x10) dir = 'down';
      else if (byte6 === 0x20) dir = 'right';

      if (dir) {
        if (dir !== lastMoveDir) { lastMoveDir = dir; moveDirCount = 0; }
        moveDirCount++;
        const inc      = moveIncrement(moveDirCount);
        const displayW = device.numberCellColumns * 2;
        const displayH = device.numberCellRows * 4;
        const cupx     = viewport.w / displayW;
        const cupy     = viewport.h / displayH;
        if      (dir === 'left')  cursor.x -= inc * cupx;
        else if (dir === 'right') cursor.x += inc * cupx;
        else if (dir === 'up')    cursor.y -= inc * cupy;
        else if (dir === 'down')  cursor.y += inc * cupy;
        cursor.x = Math.max(0, Math.min(CANVAS_W, cursor.x));
        cursor.y = Math.max(0, Math.min(CANVAS_H, cursor.y));
        panViewportToCursor(device);
        renderCanvas(device);
        sendPathMessage(device);
      } else {
        lastMoveDir = null; moveDirCount = 0;
      }
    }

    function handlePathCloseKey(byte6, label, device) {
      const letter = byte6ToLetter(byte6);

      if (byte6 === 0x07) {              // dots 123 → cancel (back to drawing)
        appMode = 'path-draw';
        logKey('path  →  back to drawing');
        sendPathMessage(device);
        return;
      }

      if (letter === 'y' || letter === 'n') {
        const closed   = (letter === 'y');
        const tag      = closed ? 'polygon' : 'polyline';
        const count    = svgShapes().filter(el => shapeName(el).replace(/\d+$/, '') === 'path').length + 1;
        const id       = `path${String(count).padStart(3, '0')}`;
        const pts      = pathVertices.map(v => `${+v.x.toFixed(2)},${+v.y.toFixed(2)}`).join(' ');
        const displayW = device.numberCellColumns * 2;
        const displayH = device.numberCellRows * 4;
        const cupx     = viewport.w / displayW;
        const cupy     = viewport.h / displayH;
        const sw       = Math.max(cupx, cupy).toFixed(2);

        const el = svgDoc.createElementNS(SVG_NS, tag);
        el.setAttribute('data-name', id);
        el.setAttribute('id', id);
        el.setAttribute('points', pts);
        el.setAttribute('fill', 'none');
        el.setAttribute('stroke', 'black');
        el.setAttribute('stroke-width', sw);
        svgDoc.documentElement.appendChild(el);

        pathVertices = [];
        jumpAnchorId = id;
        appMode      = 'normal';
        renderCanvas(device);
        sendMessage(id, device);
        logKey(`path  →  placed ${id} (${closed ? 'closed' : 'open'})`);
      }
    }

    // ── Zoom (no mode — available any time in normal mode via dot chords) ─────
    function zoomPercent() {
      return Math.round((viewport.w / CANVAS_W) * 100);
    }

    // Resize the viewport to (newW, newH), keeping the cursor's fractional
    // position within the viewport the same so its position on the display
    // stays fixed (clamped to canvas bounds when there's no room to do so).
    function setViewportSize(newW, newH) {
      const fracX = (cursor.x - viewport.x) / viewport.w;
      const fracY = (cursor.y - viewport.y) / viewport.h;
      viewport.w = newW;
      viewport.h = newH;
      viewport.x = Math.max(0, Math.min(CANVAS_W - newW, cursor.x - fracX * newW));
      viewport.y = Math.max(0, Math.min(CANVAS_H - newH, cursor.y - fracY * newH));
    }

    function zoomIn(device) {       // dots 5+6
      setViewportSize(
        Math.max(MIN_VIEWPORT_W, viewport.w / 2),
        Math.max(MIN_VIEWPORT_H, viewport.h / 2));
      renderCanvas(device);
      sendMessage(`${zoomPercent()}% visible`, device);
      logKey(`zoom in  →  ${zoomPercent()}% visible`);
    }

    function zoomOut(device) {      // dots 2+3
      setViewportSize(
        Math.min(CANVAS_W, viewport.w * 2),
        Math.min(CANVAS_H, viewport.h * 2));
      renderCanvas(device);
      sendMessage(`${zoomPercent()}% visible`, device);
      logKey(`zoom out  →  ${zoomPercent()}% visible`);
    }

    // ── Cursor movement ───────────────────────────────────────────────────────
    function moveIncrement(count) {
      if (count <= 3) return 1;
      if (count <= 6) return 5;
      return 10;
    }

    // Pan (snap) the viewport just enough to keep the cursor — and its full
    // crosshair, which extends 2 display pixels from the center, see
    // applyCursorToPixels — visible. Called after anything moves the cursor
    // (manual movement, object jump), so the cursor can never end up outside
    // the viewport.
    function panViewportToCursor(device) {
      const displayW = device.numberCellColumns * 2;
      const displayH = device.numberCellRows * 4;
      const marginX  = 2 * (viewport.w / displayW);
      const marginY  = 2 * (viewport.h / displayH);
      if (cursor.x - marginX < viewport.x)                  viewport.x = cursor.x - marginX;
      else if (cursor.x + marginX > viewport.x + viewport.w) viewport.x = cursor.x + marginX - viewport.w;
      if (cursor.y - marginY < viewport.y)                  viewport.y = cursor.y - marginY;
      else if (cursor.y + marginY > viewport.y + viewport.h) viewport.y = cursor.y + marginY - viewport.h;
      viewport.x = Math.max(0, Math.min(CANVAS_W - viewport.w, viewport.x));
      viewport.y = Math.max(0, Math.min(CANVAS_H - viewport.h, viewport.y));
    }

    function moveCursor(dir, device) {
      jumpAnchorId = null;  // manual move breaks the jump sequence
      if (dir !== lastMoveDir) { lastMoveDir = dir; moveDirCount = 0; }
      moveDirCount++;
      const inc      = moveIncrement(moveDirCount);
      const displayW = device.numberCellColumns * 2;
      const displayH = device.numberCellRows * 4;
      const cupx     = viewport.w / displayW;
      const cupy     = viewport.h / displayH;
      if      (dir === 'left')  cursor.x -= inc * cupx;
      else if (dir === 'right') cursor.x += inc * cupx;
      else if (dir === 'up')    cursor.y -= inc * cupy;
      else if (dir === 'down')  cursor.y += inc * cupy;
      cursor.x = Math.max(0, Math.min(CANVAS_W, cursor.x));
      cursor.y = Math.max(0, Math.min(CANVAS_H, cursor.y));

      panViewportToCursor(device);

      const over = cursorOverObject();
      if (over) sendMessage(shapeName(over), device);
      else      clearMessage(device);
      renderCanvas(device);
    }

    function jumpCursorToObject(dir, device) {
      const sorted = shapesSorted();
      if (sorted.length === 0) return;

      // Single-object shortcut: always jump to the only shape.
      if (sorted.length === 1) {
        const target = sorted[0];
        jumpAnchorId = target.getAttribute('id');
        const c = shapeCenter(target);
        cursor.x = c.cx; cursor.y = c.cy;
        panViewportToCursor(device);
        sendMessage(shapeName(target), device);
        renderCanvas(device);
        logKey(`jump  →  ${shapeName(target)}`);
        return;
      }

      // Determine current position in sorted list:
      // 1. jumpAnchorId: used when navigating sequentially — guarantees every object
      //    is reachable even when shapes overlap (z-order is irrelevant here).
      // 2. Cursor position fallback (anchor is null after a manual cursor move):
      //    search sorted nav order (NOT z-order) for the first shape containing
      //    the cursor, so overlapping objects are all reachable forward and backward.
      // 3. Nearest shape by center distance when cursor is in whitespace.
      let currentIdx = -1;
      if (jumpAnchorId) {
        currentIdx = sorted.findIndex(el => el.getAttribute('id') === jumpAnchorId);
      }
      if (currentIdx < 0) {
        currentIdx = sorted.findIndex(el => pointInShape(el, cursor.x, cursor.y));
      }

      let targetIdx;
      if (currentIdx >= 0) {
        targetIdx = (currentIdx + dir + sorted.length) % sorted.length;
      } else {
        // Cursor in whitespace with no anchor: jump to nearest shape.
        let nearestDist = Infinity;
        targetIdx = 0;
        for (let i = 0; i < sorted.length; i++) {
          const { cx, cy } = shapeCenter(sorted[i]);
          const dist = Math.hypot(cx - cursor.x, cy - cursor.y);
          if (dist < nearestDist) { nearestDist = dist; targetIdx = i; }
        }
      }

      const target = sorted[targetIdx];
      jumpAnchorId = target.getAttribute('id');
      const c = shapeCenter(target);
      cursor.x = c.cx;
      cursor.y = c.cy;
      panViewportToCursor(device);
      sendMessage(shapeName(target), device);
      renderCanvas(device);
      logKey(`jump  →  ${shapeName(target)}`);
    }

    // ── Callbacks ───────────────────────────────────────────────────────────
    sdk.setCallBack(
      (device, dataCode) => {
        if (dataCode === DataCodes.Connected) {
          setConnectedState(device);
          renderCanvas(device);
        } else if (dataCode === DataCodes.Disconnected) {
          setDisconnectedState();
        }
      },
      (device, keyCode, msg) => {
        const label  = msg || keyCode;
        const byte6  = labelToByte6(label);
        const letter = byte6ToLetter(byte6);

        if (appMode === 'dialog')       { return; }
        if (appMode === 'overview')     { appMode = 'normal'; renderCanvas(device); logKey('overview  →  dismissed'); return; }
        if (appMode === 'new-object')   { handleNewObjectKey(byte6, label, device);   return; }
        if (appMode === 'action')       { handleActionKey(byte6, label, device);      return; }
        if (appMode === 'move')         { handleMoveKey(byte6, label, device);        return; }
        if (appMode === 'delete-group') { handleDeleteGroupKey(byte6, label, device); return; }
        if (appMode === 'path-draw')    { handlePathDrawKey(byte6, label, device);    return; }
        if (appMode === 'path-close')   { handlePathCloseKey(byte6, label, device);   return; }
        if (appMode === 'quad-draw')     { handleQuadDrawKey(byte6, label, device);     return; }
        if (appMode === 'circle-draw')  { handleCircleDrawKey(byte6, label, device);   return; }
        if (appMode === 'ellipse-draw') { handleEllipseDrawKey(byte6, label, device);  return; }

        // Normal mode — cursor movement (resets acceleration on direction change)
        if (byte6 === 0x04) { moveCursor('left',  device); return; }  // LP alone
        if (byte6 === 0x20) { moveCursor('right', device); return; }  // RP alone
        if (byte6 === 0x02) { moveCursor('up',    device); return; }  // dot2 alone
        if (byte6 === 0x10) { moveCursor('down',  device); return; }  // dot5 alone

        // Zoom (available any time, no mode/confirmation needed)
        if (byte6 === 0x30) { zoomIn(device);  return; }  // dots 5+6
        if (byte6 === 0x06) { zoomOut(device); return; }  // dots 2+3

        // Object jump
        if (byte6 === 0x01) { jumpCursorToObject(-1, device); return; }  // dot1 → prev
        if (byte6 === 0x08) { jumpCursorToObject(+1, device); return; }  // dot4 → next

        // Any other key resets the move-acceleration counter
        lastMoveDir = null; moveDirCount = 0;

        if (letter === 'v') {
          cursorVisible = !cursorVisible;
          renderCanvas(device);
          logKey(`cursor  →  ${cursorVisible ? 'visible' : 'hidden'}`);
          return;
        }
        if (letter === 's') {
          const over = currentObject();
          if (over) {
            const isSelected = over.getAttribute('data-selected') === 'true';
            if (isSelected) {
              removeFromSelection(over);
              renderCanvas(device);
              sendMessage('deselected', device);
              logKey(`s  →  deselected ${shapeName(over)}`);
            } else {
              addToSelection(over);
              renderCanvas(device);
              sendMessage(`${shapeName(over)} selected`, device);
              logKey(`s  →  selected ${shapeName(over)}`);
            }
          } else {
            sendMessage('no object', device);
            logKey('s  →  no object under cursor');
          }
          return;
        }
        if (letter === 'e') {
          const over = currentObject();
          if (!over) {
            sendMessage('no object', device);
            logKey('e  →  no object under cursor');
          } else {
            enterActionMode(over, device);
          }
          return;
        }
        if (letter === 'n') { enterNewObject(device); return; }
        if (letter === 'o') { appMode = 'overview'; renderOverview(device); logKey('overview  →  shown'); return; }

        // Default: show raw dot pattern on message line
        const cellHex = byte6.toString(16).padStart(2, '0').toUpperCase();
        const msgHex  = cellHex + '00'.repeat(device.numberBrailleCellColumns - 1);
        const zeros   = '00'.repeat(device.numberBrailleCellColumns);
        sdk.displayTextData(zeros,  device, DisplayMode.TextMode);
        sdk.displayTextData(msgHex, device, DisplayMode.TextMode);
        logKey(letter ? `${label}  →  "${letter}"` : `${label}  →  ${msgHex}`);
      }
    );

    // ── Event handlers ──────────────────────────────────────────────────────
    btnConnect.addEventListener('click', async () => {
      btnConnect.disabled    = true;
      connStatus.textContent = 'scanning…';
      try {
        const bleDevice = await scanner.startBleScan();
        if (!bleDevice) {
          connStatus.textContent = 'no device selected';
          btnConnect.disabled    = false;
          return;
        }
        connStatus.textContent = 'connecting…';
        const dotDevice = await sdk.connectBleDevice(bleDevice);
        if (!dotDevice) {
          connStatus.textContent = 'connection failed';
          btnConnect.disabled    = false;
        }
      } catch (err) {
        connStatus.textContent = `error: ${err.message}`;
        btnConnect.disabled    = false;
      }
    });

    btnDisconnect.addEventListener('click', () => {
      if (currentDevice) sdk.disconnect(currentDevice);
    });

    async function sendSvg() {
      if (!currentDevice) return;
      const svg = mainSvg.value.trim();
      if (!svg) return;

      // Parse the pasted SVG into svgDoc so navigation, selection, and
      // all other app logic work against the new shapes.
      const parsed = svgParser.parseFromString(svg, 'image/svg+xml');
      const parseErr = parsed.querySelector('parsererror');
      if (parseErr) {
        renderStatus.textContent = 'SVG parse error';
        renderStatus.className   = 'error';
        return;
      }
      svgDoc = parsed;

      // Reset all app state that references the previous shape set.
      appMode         = 'normal';
      jumpAnchorId    = null;
      newObjectIndex  = 0;
      actionIndex     = 0;
      actionTarget    = null;
      moveSnapshot    = null;
      resizeRpCount   = 0;
      resizeLpCount   = 0;
      activeShapeList = [];
      ellipseF1       = null;
      ellipseF2       = null;
      ellipsePhase    = 1;

      btnMainSend.disabled     = true;
      renderStatus.textContent = 'Rendering…';
      renderStatus.className   = '';

      try {
        await renderCanvas(currentDevice);
        renderStatus.textContent = 'Sent.';
      } catch (err) {
        renderStatus.textContent = `Error: ${err.message}`;
        renderStatus.className   = 'error';
      } finally {
        btnMainSend.disabled = false;
      }
    }

    btnMainSend.addEventListener('click', sendSvg);

    // ? key opens help
    document.addEventListener('keydown', e => {
      if (e.key === '?' && !helpDialog.open &&
          !document.getElementById('rename-overlay').classList.contains('open')) {
        openHelp();
        e.preventDefault();
      }
    });
  </script>

</body>
</html>
